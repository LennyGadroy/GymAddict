<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gym Addict</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hdr">
  <div>
    <div class="logo">⚡ FITCORE</div>
    <span class="logo-sub">HYBRID TRACKER</span>
  </div>
  <div class="hdr-right">
    <div class="streak" id="streakBadge">🔥 0j</div>
    <div class="reg" id="regBadge">—%</div>
    <div class="save-ind" id="saveInd">✓ Enregistré</div>
  </div>
</header>

<div class="tab active" id="tab-today">
  <div id="today-content"></div>
</div>

<div class="tab" id="tab-week">
  <div id="week-content"></div>
</div>

<div class="tab" id="tab-stats">
  <div id="stats-content"></div>
</div>

<div class="tab" id="tab-cardio">
  <div id="cardio-content"></div>
</div>

<div class="tmr" id="timerWidget">
  <div class="tmr-time" id="timerDisplay">3:00</div>
  <div class="tmr-info">
    <div class="tmr-lbl">Temps de repos</div>
    <div class="tmr-ex" id="timerExName">—</div>
  </div>
  <div class="tmr-btns">
    <button class="btn-add" onclick="addTime(30)">+30s</button>
    <button class="btn-x" onclick="dismissTimer()">✕</button>
  </div>
</div>

<div class="pr-pop" id="prPopup">
  <div class="pr-emoji">🏆</div>
  <div class="pr-title">NOUVEAU RECORD !</div>
  <div class="pr-name" id="prPopName">—</div>
  <div class="pr-val" id="prPopVal">—</div>
</div>

<nav class="bnav">
  <button class="nbtn on" id="nav-today" onclick="switchTab('today')"><span class="ni">🏠</span>Aujourd'hui</button>
  <button class="nbtn" id="nav-week" onclick="switchTab('week')"><span class="ni">📅</span>Programme</button>
  <button class="nbtn" id="nav-stats" onclick="switchTab('stats')"><span class="ni">📊</span>Stats</button>
  <button class="nbtn" id="nav-cardio" onclick="switchTab('cardio')"><span class="ni">🏃</span>Cardio</button>
</nav>
<script src="script.js"></script>
</body>
</html>
