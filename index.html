<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Addict</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-light: #f8fafc;
            --accent: #10b981;
            --danger: #ef4444;
            --running: #ea580c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 15px;
            padding-bottom: 80px; 
        }

        h1, h2, h3 { text-align: center; margin-top: 5px; }

        .card {
            background-color: var(--bg-card);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        input[type="number"] {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #475569;
            background: #334155;
            color: white;
            text-align: center;
        }

        button {
            padding: 10px 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .weight-tracker { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
        .chart-container { position: relative; height: 200px; width: 100%; margin-top: 10px; display: none; }

        .tabs { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 10px; margin-bottom: 15px; }
        .tablink { flex: 0 0 auto; background-color: #334155; padding: 10px 15px; border-radius: 8px; transition: 0.3s; }
        .tablink.active { background-color: var(--primary); }
        .tabcontent { display: none; animation: fadeEffect 0.4s; }
        @keyframes fadeEffect { from {opacity: 0;} to {opacity: 1;} }

        .progress-wrapper { background: #334155; border-radius: 10px; height: 15px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; }

        .exercise-card { background-color: var(--bg-card); padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid var(--primary); }
        .exercise-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .exercise-header h4 { margin: 0; color: var(--primary); }
        .exercise-settings { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        
        .sets-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .set-checkbox { display: none; }
        .set-label { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .set-checkbox:checked + .set-label { background-color: var(--primary); color: white; }

        .running-card { border-left-color: var(--running); }
        .running-card h4 { color: var(--running); }
        .run-stats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .run-stats div { display: flex; flex-direction: column; font-size: 0.8em; }

        .rpe-container { text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid #334155; }
        .rpe-buttons { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .rpe-btn { background: #334155; padding: 10px; border-radius: 5px; width: 40px; }
        .rpe-btn.active { background: var(--accent); }

        #timer-widget {
            position: fixed; bottom: 20px; right: 20px; background: var(--danger); color: white; padding: 15px 25px; border-radius: 50px; font-size: 1.5rem; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); display: none; align-items: center; gap: 10px; z-index: 1000;
        }
        #timer-widget button { background: white; color: var(--danger); padding: 5px 10px; font-size: 1rem; }
        
        .btn-history { font-size: 0.8em; background: #475569; padding: 5px 10px; }
        .btn-save-day { width: 100%; margin-top: 20px; padding: 15px; font-size: 1.2em; background-color: var(--accent); }
    </style>
</head>
<body>

    <h1>🔥 FitTracker Pro</h1>

    <div class="card">
        <h3>Mon Poids</h3>
        <div class="weight-tracker">
            <input type="number" id="body-weight" placeholder="Poids (kg)" step="0.1">
            <button onclick="saveBodyWeight()">Ajouter</button>
            <button onclick="toggleChart('body-weight-chart')" class="btn-history">Graphique</button>
        </div>
        <div class="chart-container" id="container-body-weight-chart">
            <canvas id="body-weight-chart"></canvas>
        </div>
    </div>

    <div class="tabs">
        <button class="tablink active" onclick="openDay(event, 'Lundi')">Lun</button>
        <button class="tablink" onclick="openDay(event, 'Mardi')">Mar</button>
        <button class="tablink" onclick="openDay(event, 'Mercredi')">Mer</button>
        <button class="tablink" onclick="openDay(event, 'Jeudi')">Jeu</button>
        <button class="tablink" onclick="openDay(event, 'Vendredi')">Ven</button>
    </div>

    <div id="Lundi" class="tabcontent" style="display:block;" data-has-run="false">
        <h2>Pecs & Triceps</h2>
        <div class="progress-wrapper"><div class="progress-bar" id="prog-Lundi"></div></div>

        <div class="exercise-card">
            <div class="exercise-header">
                <h4>Développé couché</h4>
                <button class="btn-history" onclick="toggleChart('chart-lundi-1')">Évolution</button>
            </div>
            <div class="exercise-settings">
                <input type="number" id="w-lundi-1" placeholder="Charge (kg)">
                <span>4 x 8-10 reps</span>
            </div>
            <div class="sets-container" data-day="Lundi">
                <input type="checkbox" id="l1-s1" class="set-checkbox" onchange="handleSetChange(this)"><label for="l1-s1" class="set-label">1</label>
                <input type="checkbox" id="l1-s2" class="set-checkbox" onchange="handleSetChange(this)"><label for="l1-s2" class="set-label">2</label>
                <input type="checkbox" id="l1-s3" class="set-checkbox" onchange="handleSetChange(this)"><label for="l1-s3" class="set-label">3</label>
                <input type="checkbox" id="l1-s4" class="set-checkbox" onchange="handleSetChange(this)"><label for="l1-s4" class="set-label">4</label>
            </div>
            <div class="chart-container" id="container-chart-lundi-1"><canvas id="chart-lundi-1"></canvas></div>
        </div>

        <div class="exercise-card">
            <div class="exercise-header">
                <h4>Développé incliné haltères</h4>
                <button class="btn-history" onclick="toggleChart('chart-lundi-2')">Évolution</button>
            </div>
            <div class="exercise-settings">
                <input type="number" id="w-lundi-2" placeholder="Charge (kg)">
                <span>3 x 10-12 reps</span>
            </div>
            <div class="sets-container" data-day="Lundi">
                <input type="checkbox" id="l2-s1" class="set-checkbox" onchange="handleSetChange(this)"><label for="l2-s1" class="set-label">1</label>
                <input type="checkbox" id="l2-s2" class="set-checkbox" onchange="handleSetChange(this)"><label for="l2-s2" class="set-label">2</label>
                <input type="checkbox" id="l2-s3" class="set-checkbox" onchange="handleSetChange(this)"><label for="l2-s3" class="set-label">3</label>
            </div>
            <div class="chart-container" id="container-chart-lundi-2"><canvas id="chart-lundi-2"></canvas></div>
        </div>
        
        <div class="rpe-container">
            <h4>Ressenti Séance (RPE)</h4>
            <div class="rpe-buttons" id="rpe-Lundi">
                <button class="rpe-btn" onclick="selectRPE('Lundi', 1)">1</button>
                <button class="rpe-btn" onclick="selectRPE('Lundi', 2)">2</button>
                <button class="rpe-btn" onclick="selectRPE('Lundi', 3)">3</button>
                <button class="rpe-btn" onclick="selectRPE('Lundi', 4)">4</button>
                <button class="rpe-btn" onclick="selectRPE('Lundi', 5)">5</button>
            </div>
        </div>
        <button class="btn-save-day" onclick="saveDay('Lundi')">💾 Valider ma séance</button>
    </div>

    <div id="Mardi" class="tabcontent" data-has-run="true">
        <h2>Dos, Biceps & Running</h2>
        <div class="progress-wrapper"><div class="progress-bar" id="prog-Mardi"></div></div>

        <div class="exercise-card running-card">
            <h4>🏃‍♂️ Fractionné HIIT</h4>
            <p style="font-size: 0.9em; margin: 5px 0;">10m chauffe + (30s Sprint / 30s Marche) x15</p>
            <div class="run-stats">
                <div><label>Dist. (km)</label><input type="number" id="run-m-dist" step="0.1" style="width:60px"></div>
                <div><label>Temps (min)</label><input type="number" id="run-m-time" style="width:60px"></div>
                <div>
                    <label>Fait ?</label>
                    <input type="checkbox" id="run-m-done" class="set-checkbox run-check" onchange="updateProgress('Mardi')">
                    <label for="run-m-done" class="set-label" style="border-color:var(--running);">✓</label>
                </div>
            </div>
        </div>

        <div class="exercise-card">
            <div class="exercise-header">
                <h4>Tractions</h4>
                <button class="btn-history" onclick="toggleChart('chart-mardi-1')">Évolution</button>
            </div>
            <div class="exercise-settings">
                <input type="number" id="w-mardi-1" placeholder="Délest. (kg)">
                <span>4 x 8-10 reps</span>
            </div>
            <div class="sets-container" data-day="Mardi">
                <input type="checkbox" id="m1-s1" class="set-checkbox" onchange="handleSetChange(this)"><label for="m1-s1" class="set-label">1</label>
                <input type="checkbox" id="m1-s2" class="set-checkbox" onchange="handleSetChange(this)"><label for="m1-s2" class="set-label">2</label>
                <input type="checkbox" id="m1-s3" class="set-checkbox" onchange="handleSetChange(this)"><label for="m1-s3" class="set-label">3</label>
                <input type="checkbox" id="m1-s4" class="set-checkbox" onchange="handleSetChange(this)"><label for="m1-s4" class="set-label">4</label>
            </div>
            <div class="chart-container" id="container-chart-mardi-1"><canvas id="chart-mardi-1"></canvas></div>
        </div>

        <div class="rpe-container">
            <h4>Ressenti Séance (RPE)</h4>
            <div class="rpe-buttons" id="rpe-Mardi">
                <button class="rpe-btn" onclick="selectRPE('Mardi', 1)">1</button>
                <button class="rpe-btn" onclick="selectRPE('Mardi', 2)">2</button>
                <button class="rpe-btn" onclick="selectRPE('Mardi', 3)">3</button>
                <button class="rpe-btn" onclick="selectRPE('Mardi', 4)">4</button>
                <button class="rpe-btn" onclick="selectRPE('Mardi', 5)">5</button>
            </div>
        </div>
        <button class="btn-save-day" onclick="saveDay('Mardi')">💾 Valider ma séance</button>
    </div>

    <div id="timer-widget">
        ⏳ <span id="timer-display">03:00</span>
        <button onclick="stopTimer()">X</button>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('fitTrackerDB')) || {
            weights: {}, 
            bodyWeight: [], 
            rpe: {} 
        };

        const todayStr = new Date().toISOString().split('T')[0];

        function openDay(evt, dayName) {
            document.querySelectorAll(".tabcontent").forEach(tab => tab.style.display = "none");
            document.querySelectorAll(".tablink").forEach(link => link.classList.remove("active"));
            document.getElementById(dayName).style.display = "block";
            evt.currentTarget.classList.add("active");
            updateProgress(dayName);
        }

        function updateProgress(dayName) {
            const dayTab = document.getElementById(dayName);
            if (!dayTab) return;

            const hasRun = dayTab.getAttribute('data-has-run') === 'true';
            const gymCheckboxes = dayTab.querySelectorAll('.sets-container .set-checkbox');
            const gymChecked = dayTab.querySelectorAll('.sets-container .set-checkbox:checked');
            const runCheckbox = dayTab.querySelector('.run-check');

            let progress = 0;

            if (hasRun && runCheckbox) {
                let gymScore = gymCheckboxes.length > 0 ? (gymChecked.length / gymCheckboxes.length) * 50 : 0;
                let runScore = runCheckbox.checked ? 50 : 0;
                progress = gymScore + runScore;
            } else {
                progress = gymCheckboxes.length > 0 ? (gymChecked.length / gymCheckboxes.length) * 100 : 0;
            }

            document.getElementById(`prog-${dayName}`).style.width = `${progress}%`;
        }

        let timerInterval;
        let timeLeft = 180; 

        function handleSetChange(checkbox) {
            const dayName = checkbox.closest('.sets-container').getAttribute('data-day');
            updateProgress(dayName);

            if (checkbox.checked) {
                startTimer(180); 
            }
        }

        function startTimer(seconds) {
            clearInterval(timerInterval);
            timeLeft = seconds;
            const widget = document.getElementById('timer-widget');
            const display = document.getElementById('timer-display');
            widget.style.display = 'flex';
            widget.style.backgroundColor = 'var(--danger)';

            function updateDisplay() {
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                display.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }

            updateDisplay();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    widget.style.backgroundColor = 'var(--accent)';
                    display.innerText = "GO !";
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            document.getElementById('timer-widget').style.display = 'none';
        }

        function selectRPE(day, value) {
            const buttons = document.querySelectorAll(`#rpe-${day} .rpe-btn`);
            buttons.forEach(btn => btn.classList.remove('active'));
            buttons[value - 1].classList.add('active');
            db.rpe[day] = value;
        }

        function saveDay(dayName) {
            const dayTab = document.getElementById(dayName);
            const inputs = dayTab.querySelectorAll('input[type="number"]');
            
            inputs.forEach(input => {
                if (input.value && input.id) {
                    if (!db.weights[input.id]) db.weights[input.id] = [];
                    const lastEntry = db.weights[input.id].slice(-1)[0];
                    if (lastEntry && lastEntry.date === todayStr) {
                        lastEntry.val = input.value;
                    } else {
                        db.weights[input.id].push({ date: todayStr, val: input.value });
                    }
                }
            });

            localStorage.setItem('fitTrackerDB', JSON.stringify(db));
            alert(`✅ Données de ${dayName} sauvegardées avec succès !`);
            
            inputs.forEach(input => {
                if(input.id.startsWith('w-')) updateChart(`chart-${input.id.substring(2)}`, db.weights[input.id], 'Charge (kg)');
            });
        }

        function saveBodyWeight() {
            const val = document.getElementById('body-weight').value;
            if (!val) return;

            const lastEntry = db.bodyWeight.slice(-1)[0];
            if (lastEntry && lastEntry.date === todayStr) {
                lastEntry.val = val;
            } else {
                db.bodyWeight.push({ date: todayStr, val: val });
            }
            localStorage.setItem('fitTrackerDB', JSON.stringify(db));
            updateChart('body-weight-chart', db.bodyWeight, 'Poids (kg)', '#ea580c');
            alert("⚖️ Poids sauvegardé !");
        }

        let chartsInstances = {};

        function toggleChart(canvasId) {
            const container = document.getElementById(`container-${canvasId}`);
            if (container.style.display === 'block') {
                container.style.display = 'none';
            } else {
                container.style.display = 'block';
                let dbKey;
                let color = varPrimary = '#3b82f6';
                if (canvasId === 'body-weight-chart') {
                    dbKey = db.bodyWeight;
                    color = '#ea580c';
                } else {
                    const inputId = `w-${canvasId.replace('chart-', '')}`;
                    dbKey = db.weights[inputId] || [];
                }
                updateChart(canvasId, dbKey, 'Evolution', color);
            }
        }

        function updateChart(canvasId, dataArr, labelTxt, colorStr = '#3b82f6') {
            if (!dataArr || dataArr.length === 0) return;
            const ctx = document.getElementById(canvasId).getContext('2d');
            
            const labels = dataArr.map(item => item.date.slice(5)); 
            const data = dataArr.map(item => parseFloat(item.val));

            if (chartsInstances[canvasId]) chartsInstances[canvasId].destroy();

            chartsInstances[canvasId] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: labelTxt, data: data, borderColor: colorStr,
                        backgroundColor: colorStr + '33', borderWidth: 2, fill: true, tension: 0.3
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { ticks: { color: '#cbd5e1' }, grid: { color: '#334155' } },
                        x: { ticks: { color: '#cbd5e1' }, grid: { color: '#334155' } }
                    },
                    plugins: { legend: { labels: { color: '#f8fafc' } } }
                }
            });
        }

        window.onload = () => {
            Object.keys(db.weights).forEach(key => {
                const input = document.getElementById(key);
                if (input && db.weights[key].length > 0) {
                    input.value = db.weights[key].slice(-1)[0].val;
                }
            });
            if (db.bodyWeight.length > 0) {
                document.getElementById('body-weight').value = db.bodyWeight.slice(-1)[0].val;
            }
            updateProgress('Lundi'); 
        };
    </script>
</body>
</html>
